# /etc/nginx/sites-available/open-geoguessr
# Symlink: ln -s /etc/nginx/sites-available/open-geoguessr /etc/nginx/sites-enabled/
#
# Replace api.YOURDOMAIN.com with your actual subdomain.

server {
    listen 80;
    server_name api.YOURDOMAIN.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.YOURDOMAIN.com;

    ssl_certificate     /etc/letsencrypt/live/api.YOURDOMAIN.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.YOURDOMAIN.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Single block handles both REST API and WebSocket upgrade
    location / {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep WS connections open (default nginx timeout is 60s)
        proxy_read_timeout 86400;
    }
}
